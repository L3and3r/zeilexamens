// ── CONFIG ────────────────────────────────────────────────────────────────────
const APP_VERSION = '1.0.0';
const STORAGE_KEY  = 'zvcanisius_v2';
const PASS_RATE    = 0.70;            // 70 % drempel voor slagen
const INSTR_PASS   = 'instructeur';   // instructeurswachtwoord

// Compute roeien exam total once so it never goes stale
const ROEIEN_EXAM_TOTAL = ['roeien1','roeien2','bpr'].reduce((s,k)=>s+ROEIEN_EXAMEN[k].length, 0);

// Safe HTML escape — prevents XSS when inserting user-supplied strings into innerHTML
function esc(s){ const d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }

// ── STATE ─────────────────────────────────────────────────────────────────────
let state={};

function saveState(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); }
function loadState(){
  try{ state=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); }catch(e){ state={}; }
  if(!state.students) state.students={};
}

function studentData(){
  const s=currentStudent;
  if(!state.students[s]) state.students[s]={roeien:{modules:{}},zeilen:{lichtmatroos:{modules:{}},rood:{modules:{}},groen:{modules:{}},kb3:{modules:{}}}};
  return state.students[s];
}

function modData(disc,level,idx){
  const sd=studentData();
  if(disc==='roeien') return sd.roeien.modules[idx]||{};
  return ((sd.zeilen||{})[level]||{modules:{}}).modules[idx]||{};
}

function setModDone(disc,level,idx,score,total){
  const sd=studentData();
  const entry={completed:true,score,total,date:new Date().toLocaleDateString('nl-NL')};
  if(disc==='roeien') sd.roeien.modules[idx]=entry;
  else{ if(!sd.zeilen[level]) sd.zeilen[level]={modules:{}}; sd.zeilen[level].modules[idx]=entry; }
  saveState();
}

function setExamenDone(disc,level,score,total){
  const sd=studentData();
  const entry={completed:true,score,total,passed:score>=Math.ceil(total*PASS_RATE),date:new Date().toLocaleDateString('nl-NL')};
  if(disc==='roeien') sd.roeien.examen=entry;
  else{ if(!sd.zeilen[level]) sd.zeilen[level]={modules:{}}; sd.zeilen[level].examen=entry; }
  saveState();
}

// ── NAV STATE ─────────────────────────────────────────────────────────────────
let currentStudent='',currentView='entry',currentDiscipline='',currentLevel='';
let currentModules=[],currentModuleDisc='',currentModuleLevel='';
let currentModuleIdx=0,currentLessonIdx=0,currentMode='learn';
let currentQuizIdx=0,currentScore=0;
let examenQuestions=[],examenAnswers=[],examenIdx=0;

function $main(){ return document.getElementById('main'); }
function setTitle(t){ document.getElementById('topTitle').textContent=t; }
function setBack(v){ document.getElementById('backBtn').style.display=v?'':'none'; }
function setProgress(p){ document.getElementById('progressBar').style.width=p+'%'; }

// ── ENTRY ─────────────────────────────────────────────────────────────────────
function renderStudentEntry(){
  currentView='entry'; setTitle('ZV Canisius'); setBack(false); setProgress(0);
  const names=Object.keys(state.students||{});
  const prev=names.length?`<div style="margin-top:16px"><p style="font-size:.82rem;color:var(--muted);margin-bottom:8px">Eerder gebruikt:</p><div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">${names.map(n=>`<button class="btn btn-secondary prev-student" data-name="${esc(n)}" style="padding:8px 14px;font-size:.88rem">${esc(n)}</button>`).join('')}</div></div>`:'';
  $main().innerHTML=`
<div class="entry-wrap">
  <h2>ZV Canisius</h2>
  <p>Leerplatform roeien &amp; zeilen</p>
  <div class="entry-form">
    <input id="nameInput" type="text" placeholder="Jouw naam" maxlength="30" autocomplete="off">
    <button class="btn btn-primary" onclick="submitName()">Start ›</button>
  </div>
  ${prev}
  <p style="margin-top:20px;font-size:.78rem;color:var(--muted)">Voortgang wordt lokaal opgeslagen op dit apparaat.</p>
</div>`;
  const inp=document.getElementById('nameInput');
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') submitName(); });
  // Use data-attribute listeners — safe against names containing quotes / HTML
  $main().querySelectorAll('.prev-student').forEach(btn=>{
    btn.addEventListener('click',()=>selectStudent(btn.dataset.name));
  });
  inp.focus();
}

function selectStudent(name){ currentStudent=name; renderHome(); }

function submitName(){
  const v=document.getElementById('nameInput').value.trim();
  if(!v) return;
  currentStudent=v;
  if(!state.students[v]){ state.students[v]={roeien:{modules:{}},zeilen:{lichtmatroos:{modules:{}},rood:{modules:{}},groen:{modules:{}},kb3:{modules:{}}}}; saveState(); }
  renderHome();
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function renderHome(){
  currentView='home'; setTitle('ZV Canisius'); setBack(false); setProgress(0);
  const sd=studentData();
  const rDone=Object.values(sd.roeien.modules||{}).filter(m=>m.completed).length;
  const rEx=sd.roeien.examen||{};
  let zDone=0,zTotal=0;
  Object.entries(ZEILEN_DATA).forEach(([k,lev])=>{
    zTotal+=lev.modules.length;
    zDone+=Object.values(((sd.zeilen||{})[k]||{modules:{}}).modules||{}).filter(m=>m.completed).length;
  });
  $main().innerHTML=`
<div class="home-header">
  <h2>Welkom, ${esc(currentStudent)}!</h2>
  <p>Kies een vaartype om te oefenen.</p>
  <span class="student-chip" onclick="renderStudentEntry()">✏️ ${esc(currentStudent)}</span>
</div>
<div class="disc-grid">
  <div class="disc-card" onclick="renderDiscipline('roeien')">
    <span class="disc-icon">🚣</span>
    <h3>Roeien</h3>
    <p>Vletexamen + verdieping</p>
    <div class="disc-progress">${rDone}/${ROEIEN_MODULES.length} modules${rEx.completed?' · Examen '+(rEx.passed?'✓':'✗')+'':''}</div>
  </div>
  <div class="disc-card" onclick="renderDiscipline('zeilen')">
    <span class="disc-icon">⛵</span>
    <h3>Zeilen</h3>
    <p>CWO Lichtmatroos t/m KB III</p>
    <div class="disc-progress">${zDone}/${zTotal} modules</div>
  </div>
</div>`;
}

// ── DISCIPLINE ────────────────────────────────────────────────────────────────
function renderDiscipline(disc){
  currentDiscipline=disc;
  if(disc==='roeien') renderRoeiModuleList();
  else renderZeilLevelSelect();
}

function _modItemHtml(m,idx,disc,level,onclick){
  const md=modData(disc,level,idx);
  const status=md.completed?`<span style="color:var(--success);font-size:.78rem">✓ ${md.score}/${md.total}</span>`:`<span style="color:var(--muted);font-size:.78rem">Niet gestart</span>`;
  return `<div onclick="${onclick}(${idx})" style="display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--surface);border-radius:12px;margin-bottom:8px;cursor:pointer;border:1.5px solid ${md.completed?'var(--success)':'var(--border)'}">
    <span style="font-size:1.3rem">${m.icon||'📖'}</span>
    <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.title}</div>${status}</div>
    <span style="color:var(--muted);font-size:1.1rem">›</span>
  </div>`;
}

function renderRoeiModuleList(){
  currentView='discipline'; setTitle('Roeien'); setBack(true); setProgress(0);
  const sd=studentData(); const ex=sd.roeien.examen||{};
  const examMods=ROEIEN_MODULES.filter(m=>m.section==='exam');
  const verMods=ROEIEN_MODULES.filter(m=>m.section==='verdieping');
  $main().innerHTML=`
<div style="padding:14px">
  <h3 style="font-family:'Fraunces',serif;font-size:1rem;color:var(--navy);margin-bottom:8px">📋 Examenstof</h3>
  ${examMods.map(m=>_modItemHtml(m,ROEIEN_MODULES.indexOf(m),'roeien','','openRoeiModule')).join('')}
  <h3 style="font-family:'Fraunces',serif;font-size:1rem;color:var(--navy);margin:12px 0 8px">📚 Verdieping</h3>
  ${verMods.map(m=>_modItemHtml(m,ROEIEN_MODULES.indexOf(m),'roeien','','openRoeiModule')).join('')}
  <button onclick="startRoeiExamen()" class="btn-action" style="background:var(--navy);color:#fff">
    🎓 Examen ${ex.completed?`(${ex.passed?'✓ geslaagd':'✗ herkansing'} · ${ex.score}/${ROEIEN_EXAM_TOTAL})`:'starten'}
  </button>
</div>`;
}

function renderZeilLevelSelect(){
  currentView='discipline'; setTitle('Zeilen CWO'); setBack(true); setProgress(0);
  const sd=studentData();
  const cards=Object.entries(ZEILEN_DATA).map(([key,lev])=>{
    const ls=(sd.zeilen||{})[key]||{modules:{}};
    const done=Object.values(ls.modules||{}).filter(m=>m.completed).length;
    const ex=ls.examen||{};
    return `<div class="level-card" onclick="openZeilLevel('${key}')" style="border-color:${lev.color}40">
      <div style="font-size:1.6rem;margin-bottom:6px">${lev.icon}</div>
      <div style="font-family:'Fraunces',serif;font-size:.92rem;color:${lev.color};font-weight:700">${lev.name}</div>
      <div style="font-size:.75rem;color:var(--muted);margin-top:4px">${done}/${lev.modules.length} modules${ex.completed?' · ex '+(ex.passed?'✓':'✗'):''}</div>
    </div>`;
  }).join('');
  $main().innerHTML=`
<div style="padding:12px">
  <p style="text-align:center;color:var(--muted);font-size:.88rem;padding:6px 0 12px">Selecteer een CWO niveau</p>
  <div class="level-grid">${cards}</div>
</div>`;
}

function openZeilLevel(level){
  currentLevel=level; renderZeilModuleList();
}

function renderZeilModuleList(){
  currentView='levelSelect';
  const lev=ZEILEN_DATA[currentLevel];
  setTitle(lev.name); setBack(true); setProgress(0);
  const sd=studentData(); const ls=(sd.zeilen||{})[currentLevel]||{modules:{}}; const ex=ls.examen||{};
  $main().innerHTML=`
<div style="padding:14px">
  ${lev.modules.map((m,i)=>_modItemHtml(m,i,'zeilen',currentLevel,'openZeilModule')).join('')}
  <button onclick="startZeilExamen()" class="btn-action" style="background:${lev.color};color:#fff">
    🎓 ${lev.name} Examen ${ex.completed?`(${ex.passed?'✓':'✗'} ${ex.score}/${ex.total})`:'starten'}
  </button>
</div>`;
}

// ── MODULE / LESSON ───────────────────────────────────────────────────────────
function openRoeiModule(idx){
  currentModules=ROEIEN_MODULES; currentModuleDisc='roeien'; currentModuleLevel='';
  currentModuleIdx=idx; _startModule();
}

function openZeilModule(idx){
  currentModules=ZEILEN_DATA[currentLevel].modules; currentModuleDisc='zeilen'; currentModuleLevel=currentLevel;
  currentModuleIdx=idx; _startModule();
}

function _startModule(){
  currentView='lesson'; currentLessonIdx=0; currentMode='learn'; currentQuizIdx=0; currentScore=0;
  renderLesson();
}

function renderLesson(){
  const mod=currentModules[currentModuleIdx];
  const lessons=mod.lessons||[];
  if(currentLessonIdx>=lessons.length){ currentMode='quiz'; renderQuiz(); return; }
  const lesson=lessons[currentLessonIdx];
  const total=lessons.length+(mod.quiz||[]).length;
  setTitle(mod.title); setBack(true); setProgress(Math.round((currentLessonIdx/total)*100));

  const isGame=lesson.type==='game';
  const bodyHtml=isGame
    ? `<div style="padding:12px 16px">${lesson.body||''}</div>`
    : `<div style="padding:14px 18px;line-height:1.65">${lesson.body||lesson.content||''}</div>`;

  $main().innerHTML=`
<div>
  <div style="padding:10px 16px 0;display:flex;justify-content:space-between">
    <span style="font-size:.78rem;color:var(--muted)">Les ${currentLessonIdx+1}/${lessons.length}</span>
    <span style="font-size:.78rem;color:var(--navy);font-weight:700">${mod.icon||''} ${mod.title}</span>
  </div>
  ${lesson.title?`<h3 style="padding:8px 18px 0;font-family:'Fraunces',serif;font-size:1.05rem;color:var(--navy)">${lesson.title}</h3>`:''}
  ${bodyHtml}
  <div style="padding:10px 16px 20px;display:flex;gap:10px">
    ${currentLessonIdx>0?`<button class="btn btn-secondary" onclick="prevLesson()">‹</button>`:''}
    <button class="btn btn-primary" style="flex:1" onclick="nextLesson()">${currentLessonIdx===lessons.length-1?'📝 Naar quiz':'Volgende ›'}</button>
  </div>
</div>`;

  if(isGame){
    const gc=document.getElementById('gameContainer');
    if(gc){
      if(lesson.game==='beaufort') initBeaufort(gc);
      else if(lesson.game==='touwTabel') initTouwTabel(gc);
      else if(lesson.game==='memory') initMemoryGame(gc);
      else if(lesson.game==='commandoBouwer') initCommandoBouwer(gc);
      else if(lesson.game==='vletZoekplaatje') initVletZoekplaatje(gc);
    }
  }
}

function nextLesson(){ currentLessonIdx++; renderLesson(); }
function prevLesson(){ if(currentLessonIdx>0){ currentLessonIdx--; renderLesson(); } }

// ── QUIZ ──────────────────────────────────────────────────────────────────────
function renderQuiz(){
  const mod=currentModules[currentModuleIdx];
  const qs=mod.quiz||[];
  if(currentQuizIdx>=qs.length){ renderModuleResult(); return; }
  const q=qs[currentQuizIdx];
  const lessons=mod.lessons||[]; const total=lessons.length+qs.length;
  setTitle(mod.title); setBack(true); setProgress(Math.round(((lessons.length+currentQuizIdx)/total)*100));

  const media=q.img?`<div style="margin:10px 0;text-align:center">${q.img}</div>`:q.svg?`<div style="margin:10px 0;text-align:center">${q.svg}</div>`:'';
  $main().innerHTML=`
<div style="padding:14px">
  <div style="display:flex;justify-content:space-between;margin-bottom:10px">
    <span style="font-size:.78rem;color:var(--muted)">Vraag ${currentQuizIdx+1}/${qs.length}</span>
    <span style="font-size:.78rem;font-weight:700;color:var(--navy)">Score: ${currentScore}/${currentQuizIdx}</span>
  </div>
  ${media}
  <div style="background:var(--surface);border-radius:14px;padding:14px 16px;margin-bottom:12px;border:1.5px solid var(--border)">
    <p style="font-weight:700;line-height:1.5">${q.q}</p>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px">
    ${q.opts.map((o,i)=>`<button class="quiz-opt" onclick="answerQuiz(${i})" style="text-align:left;padding:12px 15px;border:2px solid var(--border);border-radius:12px;background:var(--surface);font-family:inherit;font-size:.88rem;cursor:pointer;transition:.15s">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}
  </div>
</div>`;
}

function answerQuiz(chosen){
  const mod=currentModules[currentModuleIdx]; const q=mod.quiz[currentQuizIdx];
  const right=chosen===q.correct; if(right) currentScore++;
  document.querySelectorAll('.quiz-opt').forEach((b,i)=>{
    b.style.pointerEvents='none';
    if(i===q.correct){b.style.borderColor='var(--success)';b.style.background='#e8f5ee';}
    if(i===chosen&&!right){b.style.borderColor='var(--error)';b.style.background='#fdecea';}
  });
  $main().innerHTML+=`
<div style="padding:0 14px 16px">
  <div style="padding:11px 14px;border-radius:10px;background:${right?'#e8f5ee':'#fdecea'};border:1.5px solid ${right?'var(--success)':'var(--error)'};margin-top:10px">
    <p style="font-weight:700;color:${right?'var(--success)':'var(--error)'}">${right?'✓ Goed!':'✗ Helaas...'}</p>
    <p style="font-size:.85rem;margin-top:3px">${q.why||''}</p>
  </div>
  <button class="btn btn-primary" style="width:100%;margin-top:10px" onclick="nextQuiz()">${currentQuizIdx+1<(currentModules[currentModuleIdx].quiz||[]).length?'Volgende vraag →':'Resultaat bekijken'}</button>
</div>`;
}

function nextQuiz(){ currentQuizIdx++; renderQuiz(); }

function renderModuleResult(){
  const mod=currentModules[currentModuleIdx]; const total=(mod.quiz||[]).length;
  const pct=total>0?Math.round((currentScore/total)*100):100; const passed=pct>=70;
  setModDone(currentModuleDisc,currentModuleLevel,currentModuleIdx,currentScore,total);
  setTitle('Resultaat'); setBack(false); setProgress(100);
  $main().innerHTML=`
<div style="padding:28px 20px;text-align:center">
  <div style="font-size:3rem;margin-bottom:10px">${passed?'🎉':'📚'}</div>
  <h2 style="font-family:'Fraunces',serif;color:${passed?'var(--success)':'var(--error)'}">${passed?'Goed gedaan!':'Nog even oefenen'}</h2>
  <p style="color:var(--muted);margin-top:4px">${mod.title}</p>
  <div style="background:var(--surface);border-radius:14px;padding:18px;margin:16px 0;border:1.5px solid var(--border)">
    <div style="font-size:2rem;font-weight:700;color:var(--navy)">${currentScore}/${total}</div>
    <div style="color:var(--muted);font-size:.88rem">${pct}% correct</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:10px">
    <button class="btn btn-secondary" onclick="_startModule()">↺ Opnieuw oefenen</button>
    <button class="btn btn-primary" onclick="${currentModuleDisc==='roeien'?'renderRoeiModuleList':'renderZeilModuleList'}()">← Terug naar modules</button>
  </div>
</div>`;
}

// ── EXAMEN ────────────────────────────────────────────────────────────────────
function startRoeiExamen(){
  currentDiscipline='roeien'; currentLevel='';
  examenQuestions=[]; ['roeien1','roeien2','bpr'].forEach(s=>ROEIEN_EXAMEN[s].forEach(q=>examenQuestions.push({...q,_section:s})));
  examenQuestions=examenQuestions.sort(()=>Math.random()-.5);
  examenIdx=0; examenAnswers=[]; renderExamenQuestion();
}

function startZeilExamen(){
  currentDiscipline='zeilen';
  examenQuestions=[...ZEILEN_DATA[currentLevel].examen].sort(()=>Math.random()-.5);
  examenIdx=0; examenAnswers=[]; renderExamenQuestion();
}

function renderExamenQuestion(){
  if(examenIdx>=examenQuestions.length){ renderExamenResult(); return; }
  const q=examenQuestions[examenIdx];
  setTitle('🎓 Examen'); setBack(false); setProgress(Math.round((examenIdx/examenQuestions.length)*100));
  const media=q.img?`<div style="margin:10px 0;text-align:center">${q.img}</div>`:q.svg?`<div style="margin:10px 0;text-align:center">${q.svg}</div>`:'';
  $main().innerHTML=`
<div style="padding:14px">
  <div style="display:flex;justify-content:space-between;margin-bottom:10px">
    <span style="font-size:.78rem;color:var(--muted)">Vraag ${examenIdx+1}/${examenQuestions.length}</span>
    <span style="font-size:.78rem;font-weight:700;color:var(--error)">🎓 Examen</span>
  </div>
  ${media}
  <div style="background:var(--surface);border-radius:14px;padding:14px 16px;margin-bottom:12px;border:1.5px solid var(--border)">
    <p style="font-weight:700;line-height:1.5">${q.q}</p>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px">
    ${q.opts.map((o,i)=>`<button class="exam-opt" onclick="answerExamen(${i})" style="text-align:left;padding:12px 15px;border:2px solid var(--border);border-radius:12px;background:var(--surface);font-family:inherit;font-size:.88rem;cursor:pointer;transition:.15s">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}
  </div>
</div>`;
}

function answerExamen(chosen){
  const q=examenQuestions[examenIdx]; examenAnswers.push({q,chosen,correct:chosen===q.correct});
  document.querySelectorAll('.exam-opt').forEach((b,i)=>{
    b.style.pointerEvents='none';
    if(i===q.correct){b.style.borderColor='var(--success)';b.style.background='#e8f5ee';}
    if(i===chosen&&chosen!==q.correct){b.style.borderColor='var(--error)';b.style.background='#fdecea';}
  });
  $main().innerHTML+=`
<div style="padding:0 14px 16px">
  <div style="padding:11px 14px;border-radius:10px;background:${chosen===q.correct?'#e8f5ee':'#fdecea'};border:1.5px solid ${chosen===q.correct?'var(--success)':'var(--error)'};margin-top:10px">
    <p style="font-weight:700;color:${chosen===q.correct?'var(--success)':'var(--error)'}">${chosen===q.correct?'✓ Goed!':'✗ Fout'}</p>
    <p style="font-size:.85rem;margin-top:3px">${q.why||''}</p>
  </div>
  <button class="btn btn-primary" style="width:100%;margin-top:10px" onclick="nextExamen()">Volgende →</button>
</div>`;
}

function nextExamen(){ examenIdx++; renderExamenQuestion(); }

function renderExamenResult(){
  const score=examenAnswers.filter(a=>a.correct).length; const total=examenQuestions.length;
  const pct=Math.round((score/total)*100); const passed=pct>=70;
  setExamenDone(currentDiscipline,currentLevel,score,total);
  setTitle('Examenresultaat'); setBack(false); setProgress(100);
  const details=examenAnswers.map((a,i)=>`
<div style="padding:7px 12px;border-left:3px solid ${a.correct?'var(--success)':'var(--error)'};margin-bottom:5px;background:var(--surface);border-radius:0 8px 8px 0">
  <p style="font-size:.82rem;font-weight:700">${i+1}. ${a.q.q}</p>
  <p style="font-size:.79rem;color:${a.correct?'var(--success)':'var(--error)'}">${a.correct?'✓':'✗'} ${a.q.opts[a.q.correct]}</p>
</div>`).join('');
  $main().innerHTML=`
<div style="padding:22px 18px">
  <div style="text-align:center;margin-bottom:18px">
    <div style="font-size:3rem">${passed?'🏆':'📝'}</div>
    <h2 style="font-family:'Fraunces',serif;color:${passed?'var(--success)':'var(--error)'};margin-top:8px">${passed?'Geslaagd!':'Helaas, herkansing'}</h2>
    <div style="font-size:1.8rem;font-weight:700;color:var(--navy);margin-top:8px">${score}/${total}</div>
    <div style="color:var(--muted)">${pct}% — drempel 70%</div>
  </div>
  <details style="margin-bottom:14px"><summary style="cursor:pointer;font-weight:700;padding:8px 0;color:var(--navy)">📋 Antwoorden bekijken</summary><div style="margin-top:8px">${details}</div></details>
  <div style="display:flex;flex-direction:column;gap:10px">
    <button class="btn btn-secondary" onclick="${currentDiscipline==='roeien'?'startRoeiExamen':'startZeilExamen'}()">↺ Herkansen</button>
    <button class="btn btn-primary" onclick="${currentDiscipline==='roeien'?'renderRoeiModuleList':'renderZeilModuleList'}()">← Terug naar modules</button>
  </div>
</div>`;
}

// ── INSTRUCTOR ────────────────────────────────────────────────────────────────
function renderInstructor(){
  setTitle('Instructeur'); setBack(true); setProgress(0);
  const entries=Object.entries(state.students||{});
  if(!entries.length){ $main().innerHTML=`<div style="padding:24px;text-align:center;color:var(--muted)">Nog geen leerlingen.</div>`; return; }

  const rows=entries.map(([name,sd])=>{
    const rDone=Object.values(sd.roeien.modules||{}).filter(m=>m.completed).length;
    const rEx=sd.roeien.examen||{};
    const zSummary=Object.entries(ZEILEN_DATA).map(([k,lev])=>{
      const ls=(sd.zeilen||{})[k]||{modules:{}};
      const done=Object.values(ls.modules||{}).filter(m=>m.completed).length;
      const ex=ls.examen||{};
      return `${lev.icon} ${done}/${lev.modules.length}${ex.completed?' '+( ex.passed?'✓':'✗'):''}`;
    }).join('  ');
    return `<tr>
      <td style="padding:8px 10px;font-weight:700;white-space:nowrap">${esc(name)}</td>
      <td style="padding:8px 10px">${rDone}/${ROEIEN_MODULES.length}${rEx.completed?`<br><small style="color:${rEx.passed?'var(--success)':'var(--error)'}">${rEx.passed?'✓':'✗'} ${rEx.score}/${ROEIEN_EXAM_TOTAL}</small>`:''}</td>
      <td style="padding:8px 10px;font-size:.78rem;line-height:1.8">${zSummary}</td>
      <td style="padding:8px 6px;text-align:right"><button class="del-student-btn" data-name="${esc(name)}" title="Verwijder ${esc(name)}" style="background:none;border:1.5px solid var(--error);color:var(--error);border-radius:8px;padding:4px 8px;cursor:pointer;font-size:.78rem;line-height:1">🗑</button></td>
    </tr>`;
  }).join('');

  $main().innerHTML=`
<div style="padding:16px">
  <h2 style="font-family:'Fraunces',serif;font-size:1.15rem;color:var(--navy);margin-bottom:12px">👨‍🏫 Leerlingoverzicht</h2>
  <div style="overflow-x:auto">
    <table class="instr-table">
      <thead><tr style="background:var(--navy);color:#fff">
        <th style="padding:8px 10px;text-align:left">Naam</th>
        <th style="padding:8px 10px;text-align:left">Roeien</th>
        <th style="padding:8px 10px;text-align:left">Zeilen (CWO)</th>
        <th style="padding:8px 6px;width:36px"></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  <button class="btn btn-secondary" style="margin-top:14px;width:100%" onclick="exportData()">📥 Exporteer JSON</button>
</div>`;
  // Per-row delete — each button shows a proper confirmation with the student's name
  $main().querySelectorAll('.del-student-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const name=btn.dataset.name;
      _confirmDelete(name);
    });
  });
}

function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download='zvcanisius_voortgang.json'; a.click(); URL.revokeObjectURL(url);
}

function _confirmDelete(name){
  // Show an in-page confirmation overlay instead of a bare browser prompt
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(11,37,69,.55);display:flex;align-items:center;justify-content:center;z-index:999;padding:24px';
  overlay.innerHTML=`
<div style="background:var(--surface);border-radius:var(--radius);padding:28px 24px;max-width:340px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.25)">
  <p style="font-size:1.05rem;font-weight:700;color:var(--navy);margin-bottom:8px">Leerling verwijderen?</p>
  <p style="color:var(--muted);font-size:.9rem;margin-bottom:20px">Alle voortgang van <strong>${esc(name)}</strong> wordt permanent verwijderd. Dit kan niet ongedaan worden gemaakt.</p>
  <div style="display:flex;gap:10px">
    <button id="_delCancel" class="btn btn-secondary" style="flex:1">Annuleren</button>
    <button id="_delConfirm" class="btn" style="flex:1;background:var(--error);color:#fff">Verwijderen</button>
  </div>
</div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#_delCancel').addEventListener('click',()=>overlay.remove());
  overlay.querySelector('#_delConfirm').addEventListener('click',()=>{
    delete state.students[name];
    saveState();
    overlay.remove();
    renderInstructor();
  });
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.getElementById('backBtn').addEventListener('click',()=>{
  if(currentView==='discipline') renderHome();
  else if(currentView==='levelSelect') renderZeilLevelSelect();
  else if(currentView==='lesson'||currentView==='quiz'){
    if(currentModuleDisc==='roeien') renderRoeiModuleList(); else renderZeilModuleList();
  }
  else renderHome();
});

document.getElementById('resetBtn').addEventListener('click',()=>{
  if(!currentStudent){ renderStudentEntry(); return; }
  if(confirm('Reset alle voortgang voor '+currentStudent+'? Dit kan niet ongedaan worden gemaakt.')){
    state.students[currentStudent]={roeien:{modules:{}},zeilen:{lichtmatroos:{modules:{}},rood:{modules:{}},groen:{modules:{}},kb3:{modules:{}}}};
    saveState(); renderHome();
  }
});

document.getElementById('instructeurBtn').addEventListener('click',()=>{
  const pw=prompt('Instructeurswachtwoord:');
  if(pw===INSTR_PASS) renderInstructor();
  else if(pw!==null) alert('Onjuist wachtwoord.');
});

// ── INIT ──────────────────────────────────────────────────────────────────────
loadState();
renderStudentEntry();
</script>
</body>
</html>
