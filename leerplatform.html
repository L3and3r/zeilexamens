<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ZV Canisius Leerplatform</title>
<meta name="description" content="ZV Canisius — offline leerplatform voor roeien (vletexamen) en zeilen (CWO Lichtmatroos t/m Kielboot III).">
<meta name="theme-color" content="#0B2545">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ZV Canisius">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0B2545;--gold:#E0A458;--gold-soft:#FDF4E7;--sea:#8DA9C4;
  --bg:#FBF8F3;--surface:#FFFFFF;--text:#1A2238;--muted:#5C6B7A;
  --success:#2D6A4F;--error:#C44536;--border:#E8E1D2;--radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:680px;margin:0 auto;padding-bottom:60px}
.topbar{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--navy);position:sticky;top:0;z-index:100}
.top-title{font-family:'Fraunces',serif;font-size:1.15rem;color:#fff;flex:1;text-align:center}
.icon-btn{background:none;border:none;color:#fff;font-size:1.25rem;cursor:pointer;padding:6px 8px;border-radius:10px;line-height:1;transition:background .15s}
.icon-btn:hover{background:rgba(255,255,255,.15)}
.progress-wrap{height:4px;background:rgba(255,255,255,.1);background:var(--border)}
.progress-fill{height:4px;background:var(--gold);transition:width .4s ease}

/* Home */
.home-header{padding:24px 20px 8px;text-align:center}
.home-header h2{font-family:'Fraunces',serif;font-size:1.7rem;color:var(--navy)}
.home-header p{color:var(--muted);font-size:.95rem;margin-top:6px}
.student-chip{display:inline-flex;align-items:center;gap:8px;background:var(--gold-soft);border:1px solid var(--gold);border-radius:20px;padding:6px 14px;font-size:.88rem;font-weight:600;color:var(--navy);margin-top:10px;cursor:pointer}

/* Student entry */
.entry-wrap{padding:32px 20px;text-align:center}
.entry-wrap h2{font-family:'Fraunces',serif;font-size:1.6rem;color:var(--navy);margin-bottom:8px}
.entry-wrap p{color:var(--muted);margin-bottom:24px}
.entry-form{display:flex;flex-direction:column;gap:12px;max-width:320px;margin:0 auto}
.entry-form input{padding:14px 16px;border:2px solid var(--border);border-radius:12px;font-family:inherit;font-size:1rem;background:var(--surface);color:var(--text);outline:none;transition:border .15s}
.entry-form input:focus{border-color:var(--navy)}
.btn{padding:13px 24px;border:none;border-radius:12px;font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;transition:.15s}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:#0e2f5a}
.btn-secondary{background:var(--gold-soft);color:var(--navy);border:1px solid var(--gold)}
.btn-secondary:hover{background:#f0dbb4}

/* Discipline grid */
.disc-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:16px 16px}
.disc-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:24px 16px;text-align:center;cursor:pointer;transition:.18s}
.disc-card:hover{border-color:var(--navy);transform:translateY(-2px);box-shadow:0 4px 16px rgba(11,37,69,.12)}
.disc-card .disc-icon{font-size:2.4rem;display:block;margin-bottom:10px}
.disc-card h3{font-family:'Fraunces',serif;font-size:1.2rem;color:var(--navy)}
.disc-card p{font-size:.8rem;color:var(--muted);margin-top:4px}
.disc-card .disc-progress{font-size:.78rem;color:var(--success);font-weight:700;margin-top:8px}

/* Level grid */
.level-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px 16px}
.level-card{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:18px 14px;cursor:pointer;transition:.18s;position:relative}
.level-card:hover{border-color:var(--navy);box-shadow:0 3px 12px rgba(11,37,69,.1)}
.level-card .lc-icon{font-size:1.8rem;margin-bottom:6px}
.level-card h3{font-family:'Fraunces',serif;font-size:1rem;color:var(--navy)}
.level-card p{font-size:.78rem;color:var(--muted);margin-top:3px}
.level-badge{position:absolute;top:10px;right:10px;background:var(--success);color:#fff;border-radius:10px;font-size:.7rem;font-weight:700;padding:2px 7px}

/* Module cards */
.section-label{padding:16px 16px 6px;font-size:.75rem;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.module-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin:0 16px 10px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:.15s}
.module-card:hover{border-color:var(--sea);box-shadow:0 2px 8px rgba(11,37,69,.08)}
.mc-icon{font-size:1.8rem;flex-shrink:0}
.mc-body{flex:1;min-width:0}
.mc-title{font-family:'Fraunces',serif;font-size:1rem;color:var(--navy)}
.mc-desc{font-size:.8rem;color:var(--muted);margin-top:2px}
.mc-badge{flex-shrink:0;font-size:.75rem;font-weight:700;padding:4px 10px;border-radius:10px}
.mc-badge.done{background:#E6F4ED;color:var(--success)}
.mc-badge.partial{background:#FDF4E7;color:#B07A2A}
.mc-badge.exam-btn{background:var(--navy);color:#fff;padding:6px 14px;border-radius:10px}

/* Lesson */
.lesson-wrap{padding:16px 20px}
.lesson-title{font-family:'Fraunces',serif;font-size:1.3rem;color:var(--navy);margin-bottom:14px}
.lesson-body{line-height:1.7;font-size:.95rem}
.lesson-body p{margin-bottom:10px}
.lesson-body ul,ol{padding-left:20px;margin-bottom:10px}
.lesson-body li{margin-bottom:4px}
.lesson-body h4{font-family:'Fraunces',serif;color:var(--navy);margin:12px 0 6px}
.lesson-body strong{color:var(--navy)}
.lesson-body em{color:var(--muted)}
.lesson-nav{display:flex;gap:10px;padding:16px 20px;position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--border)}
.lesson-nav .btn{flex:1}
.hint{font-size:.82rem;color:var(--muted);font-style:italic;margin-top:8px}

/* Callouts */
.callout{background:#EEF4FB;border-left:4px solid var(--sea);border-radius:10px;padding:12px 14px;margin:12px 0;font-size:.9rem}
.callout-warn{background:#FEF2F1;border-left:4px solid var(--error)}
.callout-tip{background:#E9F5EE;border-left:4px solid var(--success)}

/* Ezel + compare */
.ezel{background:var(--gold-soft);border:1px solid var(--gold);border-radius:12px;padding:12px 14px;margin:12px 0}
.ezel-lbl{font-size:.7rem;font-weight:700;color:#B07A2A;text-transform:uppercase;margin-bottom:4px}
.ezel-text{font-size:.95rem;color:var(--navy);font-weight:600}
.ezel-text .hl{color:var(--error);font-weight:900}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}
.compare-col{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px}
.compare-col h4{font-family:'Fraunces',serif;color:var(--navy);margin-bottom:6px}

/* Quiz */
.quiz-wrap{padding:16px 20px}
.quiz-q{font-family:'Fraunces',serif;font-size:1.1rem;color:var(--navy);margin-bottom:16px;line-height:1.4}
.quiz-img{margin-bottom:14px;text-align:center}
.quiz-opts{display:grid;gap:8px}
.quiz-opt{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:13px 16px;cursor:pointer;text-align:left;font-family:inherit;font-size:.92rem;color:var(--text);transition:.15s;width:100%}
.quiz-opt:hover:not(:disabled){border-color:var(--sea);background:#F0F5FB}
.quiz-opt.correct{border-color:var(--success);background:#E6F4ED;color:var(--success)}
.quiz-opt.wrong{border-color:var(--error);background:#FEF2F1;color:var(--error)}
.quiz-why{background:var(--gold-soft);border:1px solid var(--gold);border-radius:10px;padding:12px;margin-top:12px;font-size:.88rem;line-height:1.5}
.quiz-next{margin-top:14px;width:100%}

/* Result */
.result-wrap{padding:30px 20px;text-align:center}
.result-pct{font-family:'Fraunces',serif;font-size:3.5rem;color:var(--navy)}
.result-label{color:var(--muted);font-size:.9rem;margin-top:4px}
.result-btns{display:flex;flex-direction:column;gap:10px;margin-top:24px;max-width:300px;margin-left:auto;margin-right:auto}

/* Exam */
.exam-section-label{background:var(--navy);color:#fff;padding:10px 16px;font-family:'Fraunces',serif;font-size:1rem}
.exam-score-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);font-size:.9rem}
.exam-score-row.subtotal{background:var(--gold-soft);font-weight:700}

/* Knopen */
.knot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}
.knot-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 8px;text-align:center;display:flex;flex-direction:column;align-items:center}
.knot-card img{width:100%;height:80px;object-fit:contain;border-radius:4px;flex-shrink:0}
.nm{font-family:'Fraunces',serif;font-size:.85rem;color:var(--navy);margin-top:6px}
.ds{font-size:.72rem;color:var(--muted);margin-top:2px}

/* Part list */
.part-list{display:grid;gap:10px;margin:14px 0}
.part{display:flex;gap:12px;align-items:flex-start;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px}
.part-num{background:var(--navy);color:#fff;border-radius:8px;padding:4px 10px;font-family:'Fraunces',serif;font-weight:700;font-size:1.1rem;flex-shrink:0}
.part-name{font-weight:700;color:var(--navy)}
.part-desc{font-size:.82rem;color:var(--muted);margin-top:2px}

/* Borden */
.borden-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
.bord-card{text-align:center}
.bord-svg{width:56px;height:56px;display:block;margin:0 auto}
.bord-name{font-size:.7rem;color:var(--muted);margin-top:4px;line-height:1.2}

/* BPR */
.voorrang-svg{width:100%;max-width:280px;display:block;margin:10px auto;border-radius:10px}

/* Beaufort */
.beaufort-wrap{margin:12px 0}
.bf-slider{width:100%;accent-color:var(--navy);margin:10px 0}
.bf-display{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:10px}
.bf-force{font-family:'Fraunces',serif;font-size:2rem;color:var(--navy)}
.bf-name{font-weight:700;color:var(--text);font-size:1rem;margin:4px 0}
.bf-kmh{color:var(--muted);font-size:.85rem}
.bf-bar{height:8px;border-radius:4px;background:var(--border);margin:8px 0;overflow:hidden}
.bf-bar-fill{height:100%;border-radius:4px;background:var(--gold);transition:width .3s}
.bf-vlet{font-size:.88rem;color:var(--navy);margin-top:6px}

/* Touw tabel */
.touw-filters{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.touw-filter-btn{padding:6px 12px;border:1.5px solid var(--border);border-radius:20px;font-size:.8rem;cursor:pointer;background:var(--surface);font-family:inherit;transition:.15s}
.touw-filter-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.touw-table{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:8px}
.touw-table th{background:var(--navy);color:#fff;padding:8px 6px;text-align:left;font-weight:600}
.touw-table td{padding:7px 6px;border-bottom:1px solid var(--border)}
.touw-table tr:nth-child(even) td{background:#F7F4EF}
.touw-table .yes{color:var(--success);font-weight:700}
.touw-table .no{color:var(--error)}

/* Memory game */
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}
.mem-card{aspect-ratio:1;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem;border:2px solid var(--border);background:var(--navy);color:transparent;transition:.2s;user-select:none}
.mem-card.flipped{background:var(--gold-soft);color:var(--navy);border-color:var(--gold)}
.mem-card.matched{opacity:.7;cursor:default}

/* Vlet zoekplaatje */
.vlet-zoek-wrap{margin:10px 0}
.vlet-zoek-tabs{display:flex;gap:8px;margin-bottom:12px}
.vlet-tab{padding:8px 16px;border:1.5px solid var(--border);border-radius:20px;font-size:.82rem;cursor:pointer;background:var(--surface);font-family:inherit}
.vlet-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.parts-list-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:300px;overflow-y:auto;padding:4px}
.pl-item{display:flex;gap:8px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-size:.8rem}
.pl-num{background:var(--navy);color:#fff;border-radius:5px;padding:2px 6px;font-weight:700;font-size:.75rem;flex-shrink:0}

/* Commando bouwer */
.cb-wrap{margin:10px 0}
.cb-challenge{background:var(--gold-soft);border:1px solid var(--gold);border-radius:12px;padding:14px;margin-bottom:10px}
.cb-challenge p{font-weight:600;color:var(--navy);margin-bottom:10px}
.cb-tokens{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.cb-token{padding:6px 12px;border:1.5px solid var(--sea);border-radius:20px;background:var(--surface);font-size:.82rem;cursor:pointer;transition:.15s}
.cb-token:hover{background:var(--sea);color:#fff}
.cb-token.selected{background:var(--navy);color:#fff;border-color:var(--navy)}
.cb-built{min-height:40px;background:var(--surface);border:2px dashed var(--border);border-radius:10px;padding:8px;display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.cb-tag{background:var(--navy);color:#fff;border-radius:14px;padding:4px 10px;font-size:.8rem;cursor:pointer}
.cb-feedback{font-size:.85rem;padding:8px;border-radius:8px;margin-top:6px}
.cb-feedback.ok{background:#E6F4ED;color:var(--success)}
.cb-feedback.err{background:#FEF2F1;color:var(--error)}

/* Instructor */
.instructor-wrap{padding:16px}
.instructor-wrap h2{font-family:'Fraunces',serif;color:var(--navy);margin-bottom:14px}
.instr-table{width:100%;border-collapse:collapse;font-size:.82rem}
.instr-table th{background:var(--navy);color:#fff;padding:8px 6px;text-align:left}
.instr-table td{padding:7px 6px;border-bottom:1px solid var(--border)}
.instr-table tr:nth-child(even) td{background:#F7F4EF}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--surface);border-radius:var(--radius);padding:24px;max-width:340px;width:100%}
.modal h3{font-family:'Fraunces',serif;color:var(--navy);margin-bottom:10px}
.modal p{color:var(--muted);font-size:.9rem;margin-bottom:18px}
.modal-buttons{display:flex;gap:10px}
.modal-buttons .btn{flex:1}
.modal input{width:100%;padding:12px;border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:.95rem;margin-bottom:12px;outline:none}
.modal input:focus{border-color:var(--navy)}

/* Anker grid */
.anker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0;text-align:center}
.anker-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 6px}
.anker-name{font-family:'Fraunces',serif;font-size:.8rem;color:var(--navy);margin-top:4px}
.anker-desc{font-size:.7rem;color:var(--muted);margin-top:2px}

/* Reusable full-width exam/action button */
.btn-action{display:block;width:100%;margin-top:10px;padding:13px;border:none;border-radius:12px;font-family:inherit;font-size:.93rem;font-weight:700;cursor:pointer;transition:.15s}
.btn-action:hover{filter:brightness(1.08)}
</style>
</head>
<body>

  <header class="topbar">
    <button class="icon-btn" id="backBtn" style="display:none">&#8592;</button>
    <h1 class="top-title" id="topTitle">ZV Canisius</h1>
    <div style="display:flex;gap:4px;align-items:center">
      <button class="icon-btn" id="instructeurBtn" title="Instructeursmodus">&#128104;&#8205;&#127979;</button>
      <button class="icon-btn" id="resetBtn" title="Reset voortgang">&#8635;</button>
    </div>
  </header>
  <div class="progress-wrap"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
  <main id="main"></main>
</div>

function knotSvg(type,size=56){
  const k=KNOOP_IMG[type];
  if(!k) return '';
  return `<img src="${k.s}" width="${size}" height="${Math.round(size*k.a)}" style="display:block;max-width:100%;border-radius:6px" alt="${type}">`;
}

    <circle cx="404" cy="82" r="15" fill="none" stroke="#B07A2A" stroke-width="3.5" opacity="0.95"/>

}

function vletQuizSvg(highlightNum){
  const coords={54:[190,92],57:[404,82],84:[204,162]};
  const c=coords[highlightNum];
  const ring=c?`<circle cx="${c[0]}" cy="${c[1]}" r="15" fill="none" stroke="#E0A458" stroke-width="4" opacity="0.95"/><circle cx="${c[0]}" cy="${c[1]}" r="15" fill="none" stroke="#1A2238" stroke-width="1.5" opacity="0.6"/>`:'';
  return `<svg viewBox="0 0 590 205" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;border:1px solid var(--border);border-radius:12px;background:#fff">
    <image href="${VLET_EXAM_IMG}" x="0" y="0" width="590" height="205"/>
    ${ring}
  </svg>`;
}

/* Rowing vlet schematic — replaces VLET_EXAM_IMG */
function roeiVletSchemaSvg(highlightPart){
  // Parts: 54=grendelbout (pin at dolpot, gunwale left), 57=dolpot (holder mid-gunwale), 84=spant (cross-brace inside)
  const coords={54:[200,75],57:[390,75],84:[310,132]};
  const labels={54:'grendelbout',57:'dolpot',84:'spant'};
  const colors={54:'#C44536',57:'#B07A2A',84:'#2D6A4F'};
  let highlights='';
  if(highlightPart && coords[highlightPart]){
    const [cx,cy]=coords[highlightPart];
    highlights=`<circle cx="${cx}" cy="${cy}" r="16" fill="none" stroke="#E0A458" stroke-width="4"/>
    <circle cx="${cx}" cy="${cy}" r="16" fill="none" stroke="#1A2238" stroke-width="1.5" opacity="0.5"/>`;
  } else if(!highlightPart){
    highlights=Object.entries(coords).map(([n,[cx,cy]])=>`
      <circle cx="${cx}" cy="${cy}" r="14" fill="none" stroke="${colors[n]}" stroke-width="3"/>
      <text x="${cx+18}" y="${cy+4}" fill="${colors[n]}" font-family="Manrope,sans-serif" font-weight="700" font-size="12">${n} ${labels[n]}</text>`).join('');
  }
  return `<svg viewBox="0 0 620 185" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;border:1px solid var(--border);border-radius:12px;background:#f0f6fc">
    <!-- water -->
    <rect width="620" height="185" fill="#e8f1f8" rx="10"/>
    <path d="M0 160 Q155 152 310 160 Q465 168 620 160 L620 185 L0 185 Z" fill="#8DA9C4" opacity="0.4"/>
    <!-- hull -->
    <path d="M38 155 Q50 75 75 72 L545 72 Q575 75 582 115 Q580 155 565 158 L55 158 Z" fill="#FAF7F2" stroke="#0B2545" stroke-width="2.5"/>
    <!-- gunwale line -->
    <path d="M75 72 L545 72" stroke="#0B2545" stroke-width="2"/>
    <!-- mast (folded horizontal on boat) -->
    <rect x="95" y="68" width="110" height="6" fill="#8DA9C4" rx="3" stroke="#0B2545" stroke-width="1"/>
    <text x="150" y="62" fill="#5C6B7A" font-family="Manrope" font-size="10" text-anchor="middle">mast</text>
    <!-- dofts (seats) -->
    <line x1="195" y1="72" x2="195" y2="155" stroke="#C4A882" stroke-width="3"/>
    <line x1="310" y1="72" x2="310" y2="155" stroke="#C4A882" stroke-width="3"/>
    <line x1="430" y1="72" x2="430" y2="155" stroke="#C4A882" stroke-width="3"/>
    <!-- spanten (ribs inside hull) -->
    <line x1="160" y1="80" x2="160" y2="150" stroke="#A0B8C8" stroke-width="2" stroke-dasharray="3,2"/>
    <line x1="255" y1="78" x2="255" y2="152" stroke="#A0B8C8" stroke-width="2" stroke-dasharray="3,2"/>
    <line x1="370" y1="76" x2="370" y2="153" stroke="#A0B8C8" stroke-width="2" stroke-dasharray="3,2"/>
    <line x1="485" y1="78" x2="485" y2="150" stroke="#A0B8C8" stroke-width="2" stroke-dasharray="3,2"/>
    <!-- dolpots on gunwale (small rectangles) -->
    <rect x="196" y="67" width="9" height="11" fill="#E0A458" stroke="#0B2545" stroke-width="1" rx="1"/>

function zeilVletSvg(highlightPart){
  const coords={6:[266,37],21:[173,379],81:[100,164]};
  const labels={6:'gaffel',21:'lummelbeslag',81:'leuver'};
  const colors={6:'#C44536',21:'#B07A2A',81:'#2D6A4F'};
  let rings='';
  if(highlightPart && coords[highlightPart]){
    const [cx,cy]=coords[highlightPart];
    rings=`<circle cx="${cx}" cy="${cy}" r="22" fill="rgba(255,255,255,.35)" stroke="#E0A458" stroke-width="4.5"/>
    <circle cx="${cx}" cy="${cy}" r="22" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.7"/>`;
  } else {
    rings=Object.entries(coords).map(([n,[cx,cy]])=>`
      <circle cx="${cx}" cy="${cy}" r="16" fill="rgba(255,255,255,.2)" stroke="${colors[n]}" stroke-width="3"/>
      <text x="${cx}" y="${cy+5}" text-anchor="middle" fill="${colors[n]}" font-family="Manrope,sans-serif" font-weight="700" font-size="12">${n}</text>`).join('');
  }
  return `<svg viewBox="0 0 460 524" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:460px;display:block;border:1px solid var(--border);border-radius:12px;overflow:hidden">
  <image href="${ZEIL_VLET_IMG}" x="0" y="0" width="460" height="524"/>
  ${rings}
  </svg>`;
}

function initMemoryGame(container){
  const pairs=[
    {num:'294',kleur:'Geel',bg:'#F5C518'},
    {num:'419',kleur:'Rood',bg:'#C44536'},
    {num:'495',kleur:'Paars',bg:'#7B3F8C'},
    {num:'522',kleur:'Zwart',bg:'#2C2C2C'},
    {num:'687',kleur:'Groen',bg:'#2D6A4F'},
    {num:'688',kleur:'Bruin',bg:'#7B4F2E'},
    {num:'925',kleur:'Blauw',bg:'#13315C'}
  ];
  let cards=[...pairs.map(p=>({...p,face:'num'})),...pairs.map(p=>({...p,face:'kleur'}))];
  cards=cards.sort(()=>Math.random()-.5).map((c,i)=>({...c,id:i,flipped:false,matched:false}));
  let open=[],locked=false;
  const render=()=>{
    container.innerHTML=`<div class="memory-grid">${cards.map(c=>`<div class="mem-card${c.flipped||c.matched?' flipped':''}${c.matched?' matched':''}"
      style="${(c.flipped||c.matched)?`background:${c.bg};color:#fff;border-color:${c.bg}`:''}; font-size:${c.face==='num'?'.95rem':'.78rem'}"
      data-id="${c.id}">${c.flipped||c.matched?(c.face==='num'?c.num:c.kleur):'?'}</div>`).join('')}</div>
      <p style="text-align:center;font-size:.8rem;color:var(--muted)">Gevonden: ${cards.filter(c=>c.matched).length/2} / ${pairs.length}</p>`;
    container.querySelectorAll('.mem-card').forEach(el=>{
      el.onclick=()=>{
        if(locked)return;
        const id=+el.dataset.id;
        const card=cards[id];
        if(card.flipped||card.matched)return;
        card.flipped=true;open.push(id);render();
        if(open.length===2){
          locked=true;
          const [a,b]=open.map(i=>cards[i]);
          if(a.num===b.num){a.matched=b.matched=true;open=[];locked=false;render();}
          else{setTimeout(()=>{a.flipped=b.flipped=false;open=[];locked=false;render();},900);}
        }
      };
    });
  };
  render();
}

  {doel:'Bocht naar stuurboord (SB haalt, BB strijkt)',correct:['Op riemen','Stuurboord','haalt op','Bakboord','strijkt','Gelijk']}
];
const CB_TOKENS=['Op riemen','Riemen op','Riemen toe','Dollen in','Riemen geroeid','Riemen lopen','Bakboord','Stuurboord','Beide boorden','haalt op','strijkt','stopt af','riemen over','Gelijk'];

function initCommandoBouwer(container){
  let ci=0,built=[],feedback='';
  const ch=CB_CHALLENGES[ci];
  const render=()=>{
    container.innerHTML=`<div class="cb-wrap">
      <div class="cb-challenge"><p><strong>Opdracht ${ci+1}/${CB_CHALLENGES.length}:</strong> ${CB_CHALLENGES[ci].doel}</p>
        <div class="cb-built">${built.map((t,i)=>`<span class="cb-tag" data-i="${i}">${t} ✕</span>`).join('')}</div>
        <div class="cb-tokens">${CB_TOKENS.map(t=>`<button class="cb-token" data-t="${t}">${t}</button>`).join('')}</div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn btn-secondary" style="flex:1;font-size:.82rem" id="cbClear">Wis</button>
          <button class="btn btn-primary" style="flex:1;font-size:.82rem" id="cbCheck">Controleer</button>
        </div>
        ${feedback?`<div class="cb-feedback ${feedback==='ok'?'ok':'err'}">${feedback==='ok'?'✓ Correct!':'✗ Niet helemaal — probeer opnieuw.'}</div>`:''}
      </div>
      <p style="font-size:.8rem;color:var(--muted);text-align:center">${ci>0?`<button onclick="window._cbPrev()" style="background:none;border:none;color:var(--navy);cursor:pointer;font-size:.8rem">&#8592; Vorige</button>`:''} ${ci<CB_CHALLENGES.length-1?`<button onclick="window._cbNext()" style="background:none;border:none;color:var(--navy);cursor:pointer;font-size:.8rem">Volgende &#8594;</button>`:''}</p>
    </div>`;
    container.querySelectorAll('.cb-token').forEach(b=>{b.onclick=()=>{built.push(b.dataset.t);feedback='';render();}});
    container.querySelectorAll('.cb-tag').forEach(t=>{t.onclick=()=>{built.splice(+t.dataset.i,1);feedback='';render();}});
    container.querySelector('#cbClear').onclick=()=>{built=[];feedback='';render();};
    container.querySelector('#cbCheck').onclick=()=>{
      const correct=CB_CHALLENGES[ci].correct;
      const ok=built.length===correct.length&&built.every((t,i)=>t===correct[i]);
      feedback=ok?'ok':'err';render();
    };
  };
  window._cbNext=()=>{if(ci<CB_CHALLENGES.length-1){ci++;built=[];feedback='';render();}};
  window._cbPrev=()=>{if(ci>0){ci--;built=[];feedback='';render();}};
  render();
}

function initVletZoekplaatje(container){
  let mode='naslag',quizIdx=0,quizAnswered=false;
  const knownParts=[[15,'Halstalie'],[20,'Spiegel'],[34,'Wrikgat'],[21,'Mastband'],[7,'Mast'],[24,'Helmstok'],[29,'Luik'],[32,'Bolder'],[11,'Giek'],[18,'Stag']];
  const render=()=>{
    if(mode==='naslag'){
      container.innerHTML=`<div class="vlet-zoek-wrap">
        <div class="vlet-zoek-tabs">
          <button class="vlet-tab active">Naslag</button>
          <button class="vlet-tab" id="toQuiz">Quiz &#8594;</button>
        </div>
        <p style="font-size:.85rem;color:var(--muted);margin-bottom:8px">Alle 40 onderdelen van de roei-lelievlet:</p>
        <div class="parts-list-grid">${VLET_PARTS.map(([n,nm])=>`<div class="pl-item"><span class="pl-num">${n}</span>${nm}</div>`).join('')}</div>
      </div>`;
      container.querySelector('#toQuiz').onclick=()=>{mode='quiz';quizIdx=0;quizAnswered=false;render();};
    } else {
      const [partNum,partName]=knownParts[quizIdx%knownParts.length];
      const wrong=VLET_PARTS.filter(([n])=>n!==partNum).sort(()=>Math.random()-.5).slice(0,3).map(([,nm])=>nm);
      const opts=[partName,...wrong].sort(()=>Math.random()-.5);
      const svgHtml=`<div style="margin:10px 0">${vletSvg()}</div>`;
      container.innerHTML=`<div class="vlet-zoek-wrap">
        <div class="vlet-zoek-tabs">
          <button class="vlet-tab" id="toNaslag">&#8592; Naslag</button>
          <button class="vlet-tab active">Quiz</button>
        </div>
        ${svgHtml}
        <p style="font-weight:700;color:var(--navy);margin:10px 0">Wat is onderdeel <strong style="font-size:1.2rem">${partNum}</strong>?</p>
        <div style="display:grid;gap:6px">${opts.map((o,i)=>`<button class="quiz-opt" data-o="${o}" style="${quizAnswered?(o===partName?'border-color:var(--success);background:#E6F4ED':'border-color:var(--border)'):''}"> ${o}</button>`).join('')}</div>
        ${quizAnswered?`<button class="btn btn-primary quiz-next" id="vqNext">Volgende vraag &#8594;</button>`:''}
      </div>`;
      container.querySelector('#toNaslag').onclick=()=>{mode='naslag';render();};
      if(!quizAnswered){
        container.querySelectorAll('.quiz-opt').forEach(b=>{
          b.onclick=()=>{quizAnswered=true;render();};
        });
      } else {
        container.querySelector('#vqNext').onclick=()=>{quizIdx++;quizAnswered=false;render();};
      }
    }
  };
  render();
}

    {q:'Wat is de laatste stap bij aanleggen?',opts:['Pikhaak voor','Op riemen','Landen vast, spring vast, zwaard op','Stootwillen uit'],correct:2,why:'Alles vast, dan zwaard omhoog.'}
   ]},

  {id:'veiligheid',section:'exam',icon:'🛟',title:'Veiligheid',desc:'Reddingsvest, onweer, dode hoek',
   lessons:[
    {title:'Geschikte kleding',body:`<ul>
      <li>Dichte stevige <strong>schoenen</strong> — geen slippers</li>
      <li>Crocs zijn goedgekeurd</li>
      <li>Laarzen mogen, maar dan wel een reddingsvest!</li>
      <li>Warme en waterdichte kleding</li></ul>`},
    {title:'Reddingsvest — wanneer?',body:`<p>Je moet een reddingsvest dragen:</p>
      <ul><li>Bij <strong>onweer</strong></li><li>Tijdens een <strong>sleep</strong></li>
      <li>Bij <strong>harde wind</strong> / als je gereefd hebt</li>
      <li>De <strong>"2 van de 3"-regel</strong></li></ul>
      <div class="callout-warn callout"><strong>Examenvraag 12:</strong> noem 3 situaties.</div>`},
    {title:'Reddingsvest — hoe dragen?',body:`<ul>
      <li><strong>Boven</strong> alle kleding</li>
      <li>Normaal vest: strak</li>
      <li>Plofvest: precies één vuist tussen vest en ribbenkast</li>
      <li>Gebruik de <strong>reetveter</strong></li></ul>
      <div class="callout-warn callout">Plofvest mag alleen als hij gekeurd is.</div>`},
    {title:'Onweer — wat nu?',body:`<ol>
      <li>Zo snel mogelijk naar de kant</li><li>Trek je reddingsvest aan</li>
      <li>Blijf op het hout (niet op het staal!)</li><li>Laat de mast strijken</li></ol>
      <div class="callout-tip callout">Kom je sneller bij de kant door te zeilen? Doe dat dan eerst.</div>`},
    {title:'Dode hoek',body:`<p>De <strong>dode hoek</strong> is het gebied rondom een groot schip waar de schipper jou niet kan zien.</p>
      ${dodeHoekSvg()}
      <div class="callout-warn callout"><strong>Vuistregel:</strong> zie jij de stuurhut niet → hij ziet jou ook niet.</div>`},
    {title:'Zuigende & stuwende werking',body:`<p><strong>Stuwende werking</strong> (tegenkomen): boten worden uit elkaar geduwd.</p>
      <p><strong>Zuigende werking</strong> (inhalen): boten worden naar elkaar getrokken.</p>
      <div class="callout-warn callout">Hoe groter het schip + hoe ondieper het water = hoe sterker het effect.</div>`},
    {title:'Reddingsvest vs zwemvest',body:`<p>Een <strong>reddingsvest</strong> draait je hoofd naar boven — ook bewusteloos blijf je ademen.</p>
      <p>Een <strong>zwemvest</strong> houdt je alleen drijvend.</p>
      <p>Goed reddingsvest: kraag, voldoende drijfvermogen, CE-keurmerk.</p>`}
   ],
   quiz:[
    {q:'Hoe weet je of je in de dode hoek zit?',opts:['Hij toetert','Boot komt dichterbij','Je ziet de schipper/stuurhut niet meer','Je staat in zijn schaduw'],correct:2,why:'Zie jij de schipper niet → hij ziet jou ook niet.'},
    {q:'Welke situatie hoort NIET bij reddingsvest-plicht?',opts:['Bij onweer','Tijdens sleep','Harde wind','Als de zon schijnt'],correct:3,why:'Zon schijnen is geen verplichting.'},
    {q:'Wat doe je als eerste bij onweer op komst?',opts:['Mast strijken','Zo snel mogelijk naar de kant','Reddingsvest aan','Op het hout'],correct:1,why:'Eerst naar de kant, dan vest, dan mast.'},
    {q:'Mag je met laarzen aan boord?',opts:['Nee nooit','Ja altijd','Ja, maar dan reddingsvest','Alleen op zaterdag'],correct:2,why:'Laarzen lopen vol water — dan moet je een reddingsvest.'}
   ]},

  {id:'voorrang',section:'exam',icon:'⚖️',title:'BPR Voorrangsregels',desc:'Wie wijkt voor wie?',
   lessons:[
    {title:'De volgorde van regels',body:`<p>Bij twijfel: <strong>goed zeemanschap</strong> komt altijd eerst.</p>
      <ol><li>Goed zeemanschap</li><li>Stuurboordwal heeft voorrang</li><li>Klein wijkt voor Groot</li>
      <li>Hoofdvaarwater voor Nevenvaarwater</li><li>Motor wijkt voor Spier wijkt voor Zeil</li>
      <li>Kruisende koers, gelijke schepen → rechts heeft voorrang</li>
      <li>Recht op elkaar af → beiden naar stuurboord</li>
      <li>Zeil over bakboord heeft voorrang</li><li>Loef wijkt voor lij</li>
      <li><em>Stroom mee bij engtes heeft voorrang</em></li></ol>`},
    {title:'Klein vs. Groot',body:`<p><strong>Groot</strong> schip: langer dan 20 meter, of alle beroepsvaart (ook &lt;20m).</p>
      <p><strong>Klein</strong> schip: korter dan 20 meter, geen beroepsvaart.</p>
      <div class="ezel"><div class="ezel-lbl">Regel</div><div class="ezel-text">Klein wijkt <span class="hl">altijd</span> voor Groot</div></div>`},
    {title:'Motor — Spier — Zeil',body:`<div style="text-align:center;background:var(--gold-soft);padding:14px;border-radius:12px;margin:12px 0;font-size:1.1rem">
      <strong>Motor</strong> wijkt voor <strong>Spier</strong> wijkt voor <strong>Zeil</strong></div>
      <ul><li><strong>Motor</strong> wijkt voor alles behalve andere motors</li>
      <li><strong>Spier</strong> = roeien, peddelen — wijkt voor zeil</li>
      <li><strong>Zeil</strong> heeft voorrang op spier en motor</li></ul>`},
    {title:'Tussen twee zeilboten',body:`<p><strong>Zeil over bakboord heeft voorrang</strong> — de giek steekt uit aan de bakboordzijde.</p>
      <div class="ezel"><div class="ezel-lbl">Onthoud</div><div class="ezel-text">Giek aan <span class="hl">BAKboord</span> → voorrang.</div></div>
      <p style="margin-top:14px"><strong>Loef wijkt voor lij</strong> — als beide boten op dezelfde wind varen: de loefzijde wijkt.</p>
      <div class="callout"><strong>Loef</strong> = wind komt hier vandaan. <strong>Lij</strong> = wind waait hier naartoe.</div>`},
    {title:'Stuurboordwal',body:`<p><strong>Stuurboordwal heeft voorrang.</strong> Vaar je rechts van het vaarwater, dan heb je de stuurboordwal en dus voorrang.</p>`},
    {title:'Recht op elkaar af',body:`<p>Twee gelijke schepen komen recht op elkaar af: <strong>beiden naar stuurboord</strong> (rechts) — net als auto's.</p>`},
    {title:'De gradenboog',body:`<p>De drie koersen BPR:</p>
      ${gradenboogSvg()}
      <ul><li><strong>Tegengestelde koers</strong> — van voren (0°–112,5°)</li>
      <li><strong>Kruisende koers</strong> — van opzij</li>
      <li><strong>Oplopende koers</strong> — van achteren</li></ul>`},
    {title:'Engtes',body:`<p>Een engte: zo smal dat je niet naast elkaar kunt varen.</p>
      <ul><li>Wacht voor stroomafvarend schip</li><li>Wacht voor groot schip</li>
      <li>Zeilboot engte bezeild → zeil gaat voor</li><li>Motorboot wacht voor roeiboot</li></ul>`}
   ],
   quiz:[
    {q:'Wat heeft voorrang: motor of zeil?',opts:['Motor','Zeil','Geen van beide','Grootste'],correct:1,why:'Motor wijkt voor Spier wijkt voor Zeil.'},
    {q:'Twee gelijke schepen komen recht op elkaar af. Wat doen ze?',opts:['Beiden naar bakboord','Beiden naar stuurboord','Linker wijkt','Rechter wijkt'],correct:1,why:'Tegengestelde koers: beiden naar stuurboord.'},
    {q:'Vrachtschip 50m en klein zeilbootje varen kruisend. Wie wijkt?',opts:['Zeilbootje','Vrachtschip','Geen van beide','De vlet'],correct:0,why:'Klein wijkt voor Groot — sterker dan motor/zeil.'},
    {q:'Twee zeilboten: een zeil over bakboord, ander over stuurboord. Wie heeft voorrang?',opts:['Zeil over bakboord','Zeil over stuurboord','Beiden gelijk','Grootste'],correct:0,why:'Zeil over bakboord HEEFT voorrang.'}
   ]},

  {id:'betonning',section:'exam',icon:'🚥',title:'Betonning',desc:'Rode en groene tonnen',
   lessons:[
    {title:'Wat is betonning?',body:`<p>Boeien, tonnen en bakens die vaarwegen en obstakels aangeven.</p>
      ${betonningSvg()}
      <div class="compare">
        <div class="compare-col"><h4>Stuurboord</h4><p style="color:var(--error);font-weight:700">Rood</p><p>Stomp / cilinder / kegel punt omlaag</p></div>
        <div class="compare-col"><h4>Bakboord</h4><p style="color:var(--success);font-weight:700">Groen</p><p>Spits / kegel punt omhoog</p></div>
      </div>`},
    {title:'Ezelsbruggetje',body:`<div class="ezel"><div class="ezel-lbl">Onthoud!</div><div class="ezel-text">Met st<span class="hl">R</span>oom mee zit <span class="hl">R</span>ood altijd stuu<span class="hl">R</span>boord!</div></div>
      <p>Andersom: tegen de stroom in → Rood aan bakboord.</p>`},
    {title:'Splitsingen',body:`<p>Bij een splitsing zie je een speciale ton: half rood, half groen.</p>
      ${splitsingSvg()}
      <p>De bovenste kleur geeft aan welke kant het hoofdvaarwater op gaat.</p>`},
    {title:'Scheidingstonnen',body:`<ul>
      <li>Rood-groen afwisseling = gelijke kruising</li>
      <li>Nevenvaarwater aan bakboord: bol + kegel</li>
      <li>Open tak = rood. Geknoopte tak = groen.</li></ul>`}
   ],
   quiz:[
    {q:'Welke kleur ton zit aan stuurboord met stroom mee?',opts:['Groen','Rood','Geel','Wit'],correct:1,why:'stRoom mee → Rood stuuRboord.'},
    {q:'Welke vorm heeft een bakboordton?',opts:['Stomp','Spits/kegel omhoog','Bol','Vlag'],correct:1,why:'Bakboord = groen + spits.'}
   ]},

  {id:'borden',section:'exam',icon:'🚫',title:'Borden',desc:'Verbods-, gebods- en informatieborden',
   lessons:[
    {title:'Verbodsborden',body:`<p>Wit met rode rand + rode streep = verbod.</p>
      <div class="borden-grid">
        ${bordCard('verbod-doorvaart','Verboden doorvaart')}${bordCard('verbod-golf','Geen golfslag')}
        ${bordCard('verbod-anker','Verboden ligplaats')}${bordCard('verbod-meren','Verboden te meren')}
        ${bordCard('verbod-motor','Verboden motorschepen')}${bordCard('verbod-zeil','Verboden zeilschepen')}
        ${bordCard('verbod-spier','Verboden spierkracht')}${bordCard('verbod-klein','Verboden kleine schepen')}
      </div>`},
    {title:'Gebodsborden',body:`<p>Blauw met witte symbolen = wat je <em>moet</em> doen.</p>
      <div class="borden-grid">
        ${bordCard('gebod-pijl','Varen in richting pijl')}${bordCard('gebod-bb','Bakboordwal houden')}
        ${bordCard('gebod-sb','Stuurboordwal houden')}${bordCard('gebod-stop','Stilhouden')}
        ${bordCard('gebod-let','Bijzonder opletten')}
      </div>`},
    {title:'Toestemmingsborden',body:`<p>Blauw + wit maar <em>positief</em> — toestemming of aanwijzing.</p>
      <div class="borden-grid">
        ${bordCard('info-doorvaart-1','Doorvaart beide richtingen')}${bordCard('info-doorvaart-2','Doorvaart 1 richting')}
        ${bordCard('info-meer','Toestemming meren')}${bordCard('info-anker','Toestemming ankeren')}
        ${bordCard('info-keren','Keerplaats')}${bordCard('info-pont','Niet vrij-varende pont')}
      </div>
      <div class="callout"><strong>Tip:</strong> 1 ruit = tegenliggers mogelijk. 2 ruiten = géén tegenliggers.</div>`},
    {title:'Gevaren- & aanbevelingsborden',body:`<p>Driehoek met rode rand = gevaar. Gele driehoek = aanbeveling.</p>
      <div class="borden-grid">
        ${bordCard('gevaar-hoogspan','Hoogspanningslijn')}${bordCard('aanbev-pijl','Aanbeveling pijlrichting')}
        ${bordCard('aanbev-binnen','Aanbeveling binnen begrenzing')}
      </div>`},
    {title:'Welk bord mag je WEL onder?',body:`<div class="borden-grid">
        ${bordCard('verbod-zeil','Verboden zeilschepen ❌')}
        ${bordCard('verbod-spier','Verboden spierkracht ❌')}
        ${bordCard('verbod-motor','Verboden motorschepen ✓')}
      </div>
      <div class="callout"><strong>Antwoord:</strong> "Verboden voor motorschepen" — een roeiboot is spierkracht, geen motor.</div>`},
    {title:'Voorbeelden',body:`<p>Een roeiboot is <strong>spierkracht</strong>. Het bord "verboden voor spierkracht" geldt dus voor jou. "Verboden voor motorschepen" geldt niet voor jou.</p>
      <p><strong>Blauw + witte pijl</strong> = je moet die richting op.</p>
      <p><strong>Blauw + P zonder rode streep</strong> = toestemming meren.</p>`},
    {title:'Meer borden',body:`<ul>
      <li>Verboden op te lopen — bij smalle vaarwegen</li>
      <li>Hoogteschaal — doorvaarthoogte brug in meters</li>
      <li>Duikersvlag — duikers onder water!</li>
      <li>Z bord = zinker (pijpleiding), K = kabel</li>
      <li>Blauw-wit diagonaal = einde verbod/gebod</li></ul>
      <div class="callout-tip callout">Rood = verbod. Blauw = gebod/aanwijzing. Geel = aanbeveling.</div>`}
   ],
   quiz:[
    {q:'Rond bord, rode rand, doorgestreept zeilboot: betekenis?',opts:['Verboden motorschepen','Verboden zeilschepen','Verboden spierkracht','Verboden doorvaren'],correct:1,why:'Doorgestreept zeilbootje = verboden zeilschepen.'},
    {q:'Een roeiboot: welk verbodsbord mag hij negeren?',opts:['Verboden spierkracht','Verboden motorschepen','Verboden meren','Verboden doorvaart'],correct:1,why:'Roeiboot = spierkracht, geen motor.'},
    {q:'Twee gele ruiten boven een brug: betekenis?',opts:['Verboden','Doorvaart, tegenliggers verwachten','Doorvaart, géén tegenliggers','Brug gaat open'],correct:2,why:'2 ruiten = eenrichtingsverkeer.'},
    {q:'Blauw vierkant, witte pijl links: betekenis?',opts:['Verboden links','Verplicht die richting','Bakboordwal','Brug links'],correct:1,why:'Blauw + witte pijl = gebod die richting.'},
    {q:'Blauw bord + P zonder rode streep: wat betekent het?',opts:['Verboden meren','Toestemming meren','Keerplaats','Pont'],correct:1,why:'Geen rode streep = positief. P = meren.'}
   ]},

  {id:'bruggen',section:'exam',icon:'🌉',title:'Bruggen & Sluizen',desc:'Lichten en tegenliggers',
   lessons:[
    {title:'Tegenliggers ja of nee?',body:`<div class="compare">
      <div class="compare-col"><h4>1 ruit / 1 E</h4><p>Doorvaart beide richtingen → tegenliggers verwachten.</p></div>
      <div class="compare-col"><h4>2 ruiten / 2 E's</h4><p>Doorvaart één richting → géén tegenliggers.</p></div></div>
      <div class="callout-warn callout">2 gele ruiten boven brug = doorvaart toegestaan, géén tegenliggers.</div>`},
    {title:'Brug in bedrijf — lichten',body:`<ul>
      <li><strong>Rood licht</strong> = verboden</li>
      <li><strong>Rood + groen samen</strong> = klaarmaken, gaat zo open</li>
      <li><strong>Groen licht</strong> = doorvaart toegestaan</li>
      <li><strong>Rood-rood</strong> = verboden tenzij stoppen niet meer kan</li></ul>`},
    {title:'Brug buiten bedrijf',body:`<ul>
      <li>Tekens onder brug geven aan of doorvaart mag</li>
      <li>1 ruit/E → tegenliggers mogelijk</li>
      <li>2 ruiten/E's → géén tegenliggers</li></ul>`}
   ],
   quiz:[
    {q:'Twee gele ruiten boven brug: betekenis?',opts:['Verboden','Doorvaart, tegenliggers mogelijk','Doorvaart, géén tegenliggers','Brug gaat open'],correct:2,why:'2 ruiten = eenrichting, géén tegenliggers.'},
    {q:'Rood licht bij een brug: betekenis?',opts:['Doorvaart toegestaan','Verboden','Tegenliggers','Buiten bedrijf'],correct:1,why:'Rood = verboden.'}
   ]},

  {id:'tekens',section:'exam',icon:'🔺',title:'Tekens van schepen',desc:'Kegels, bollen en sleeptekens',
   lessons:[
    {title:'Blauwe kegels — afstand',body:`<p>Blauw = gevaarlijke stoffen. Afstand!</p>
      ${kegelSvg()}
      <div class="compare">
        <div class="compare-col"><h4>1 blauwe kegel</h4><p>Min. <strong>10 m</strong></p><p style="font-size:.78rem">Brandbare stoffen</p></div>
        <div class="compare-col"><h4>2 blauwe kegels</h4><p>Min. <strong>50 m</strong></p><p style="font-size:.78rem">Gezondheidsschadelijk</p></div>
      </div>
      <div style="text-align:center;margin:10px 0;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px"><strong>3 blauwe kegels</strong><br>Min. <strong>100 m</strong> — ontplofbaar</div>`},
    {title:'Andere tekens',body:`<ul>
      <li><strong>Sleepkegel</strong> (geel, punt omlaag) — voorste schip van een sleep</li>
      <li><strong>Zwarte bol</strong> — voor anker</li>
      <li><strong>Gele kegel</strong> — passagiersschip</li>
      <li><strong>Groene ruit</strong> — doorvaart vrij aan die kant</li></ul>`},
    {title:'Meer dagtekens',body:`<ul>
      <li>Gele bol — sleepschip</li>
      <li>Rood-wit bord — doorvaart vrij, maar geen hinderlijke vaarbeweging</li>
      <li>Rood bord — doorvaart verboden aan die kant</li></ul>
      <div class="callout-warn callout">Sleep-tekens (cilinder + gele bol) gelden alleen voor grote schepen.</div>`}
   ],
   quiz:[
    {q:'Hoeveel afstand bij 2 blauwe kegels?',opts:['10 m','25 m','50 m','100 m'],correct:2,why:'2 kegels = 50 m.'},
    {q:'Zwarte bol op een schip betekent?',opts:['Voor anker','Sleep','Gevaarlijk','Passagier'],correct:0,why:'Zwarte bol = voor anker.'},
    {q:'Wat betekent één blauwe kegel?',opts:['Sleep','Brandbaar — 10m','Passagier','Anker'],correct:1,why:'1 kegel = brandbaar, 10m afstand.'}
   ]},

  /* CWO Verdieping */
  {id:'manoeuvres',section:'verdieping',icon:'🎯',title:'Manoeuvres',desc:'Achtje, aanleggen, man overboord, ankeren',
   lessons:[
    {title:'Het roeien van een achtje',body:`<p>Oefen commando's met scherpe bochten:</p>
      <ol><li>Punt X: "op riemen, bakboord stopt af, stuurboord haalt op, gelijk" → bocht naar BB</li>
      <li>Rondje + terug: rechtdoor</li><li>Verder: "bakboord haalt op, stuurboord stopt af" → bocht SB</li></ol>
      <div class="callout">Bij scherpe bocht: het boord dat afstopt = de kant waar je heen draait.</div>`},
    {title:"Afvaren — alle commando's",body:`<ol>
      <li>"Riemen op"</li><li>"Dollen in"</li><li>"Los voor" + "Los achter"</li>
      <li>"Zet af"</li><li>"Boeitjes binnen"</li><li>"Riemen toe"</li>
      <li>"Op riemen, bakboord stuurboord haalt op, gelijk"</li></ol>`},
    {title:'Aanleggen met de punt',body:`<ol>
      <li>"Haakvoor, klaar staan om te springen"</li>
      <li>Op afstand: "Op riemen" — boot remt</li>
      <li>Vlak voor de kant: "Bakboord, stuurboord, stopt af"</li>
      <li>"Haakvoor, spring!"</li></ol>`},
    {title:'Aanleggen met de zijkant',body:`<ol>
      <li>"Haakvoor, klaar staan"</li><li>"Op riemen"</li><li>"Boeitjes buiten"</li>
      <li>"Stuurboord riemen lopen, bakboord strijkt"</li>
      <li>Vlak voor kant: helmstok ver naar stuurboord + "Gelijk!"</li>
      <li>"Haakvoor, spring"</li></ol>
      <div class="callout-warn callout">Tegen de wind in aanleggen = meeste controle.</div>`},
    {title:'Man overboord',body:`<ol>
      <li>"Man overboord! Zwem! [Naam] wijs!" — iemand wijst de drenkeling</li>
      <li>Boot vaart eerst weg — bepaal windrichting</li>
      <li>Grote boog → terugkomen <em>tegen de wind in</em></li>
      <li>Drenkeling aan de <strong>hoge kant</strong> (windzijde) binnenhalen</li>
      <li>Vlakbij: "Riemen geroeid" — drenkeling hijsen</li></ol>
      <div class="callout">Tegen de wind: boot drijft naar de drenkeling toe.</div>`},
    {title:'Ankeren',body:`<ol>
      <li>Controleer of anker geborgd is</li><li>Vaar tegen de wind in</li>
      <li>"Klaarstaan om anker overboord te zetten"</li>
      <li>"Bakboord, stuurboord stopt af" — stilleggen</li>
      <li>Boot deinst achteruit: "Zet anker overboord"</li>
      <li>"Anker houdt" → "Zwaard op" + lijn vastmaken (2–3× waterdiepte)</li></ol>`}
   ],
   quiz:[
    {q:'Scherpe bocht naar bakboord — welk boord stopt af?',opts:['Bakboord','Stuurboord','Beide','Geen'],correct:0,why:'Het boord waar je heen draait werkt tegen. Naar BB → BB stopt.'},
    {q:'Drenkeling binnenhalen aan de hoge kant — waarom?',opts:['Makkelijker tillen','Drijft naar de boot toe','Stuurman ziet beter','Willekeurig'],correct:1,why:'Tegen de wind aan = drenkeling drijft naar de windzijde.'},
    {q:'Wat is een haakvoor?',opts:['Voorste roeier','Persoon die landvasten/stootwillen regelt','De helmstok','De roerganger'],correct:1,why:'De haakvoor regelt de landvasten en duwt af.'},
    {q:'Hoeveel ankerlijn vier je uit?',opts:['1× diepte','2–3× diepte','5× diepte','Zoveel mogelijk'],correct:1,why:'2–3× de waterdiepte is de vuistregel.'},
    {q:'Wanneer ga je tegen de wind in bij ankeren?',opts:['Nooit','Altijd','Alleen harde wind','Alleen op zee'],correct:1,why:'Tegen de wind = boot deinst gecontroleerd achteruit.'}
   ]},

  {id:'vaartechnieken',section:'verdieping',icon:'🚣',title:'Wrikken, jagen, slepen',desc:'Andere manieren van voortbewegen',
   lessons:[
    {title:'Wrikken',body:`<p><strong>Wrikken</strong> = voortbewegen op één riem via het wrikgat (spiegel, stuurboordzijde).</p>
      <ol><li>Riem in het wrikgat, blad aan bakboordzijde</li>
      <li>Handen naar rechts → blad gaat naar links (polsen NIET draaien)</li>
      <li>Aan einde slag: polsen 90° draaien</li>
      <li>Handen terug naar links → blad naar rechts</li></ol>
      <p>Je blad tekent een <strong>achtje</strong> in het water.</p>
      <div class="callout-warn callout">Wrikgat zit aan stuurboord — dus altijd licht corrigeren.</div>`},
    {title:'Jagen',body:`<p><strong>Jagen</strong> = boot voorttrekken met een lijn vanaf de wal.</p>
      <ul><li>Lijn aan de val in de mast (voorkomt vasthaken aan oever)</li>
      <li>Niet ineens veel kracht — mast is breekbaar</li>
      <li>Twee mensen blijven aan boord</li></ul>`},
    {title:'Slepen',body:`<p><strong>Slepen</strong> = een sleepboot trekt jullie.</p>
      <ul><li>Boten achter elkaar, sleeplijnen om en om BB/SB</li>
      <li>Alle boten behalve de achterste: zwaard omhoog</li></ul>
      <p><strong>Regels:</strong> niet staan, niet in slaapzak, niet overlopen, reddingsvest als gevraagd.</p>
      <div class="callout">Afremmen: achterste boot gooit band/emmer overboord.</div>`}
   ],
   quiz:[
    {q:'Welk patroon maakt het riemblad bij wrikken?',opts:['Rechte lijn','Achtje','Cirkel','Driehoek'],correct:1,why:'Polsen draaien per slag 90° → achtje.'},
    {q:'Aan welke zijde zit het wrikgat?',opts:['Bakboord','Stuurboord','Midden','Maakt niet uit'],correct:1,why:'Wrikgat zit aan stuurboord.'},
    {q:'Waar maak je de jaaglijn best vast?',opts:['Kikker voorop','Val in de mast','Aan het roer','Achterspring'],correct:1,why:'Val in mast voorkomt vasthaken langs de kant.'},
    {q:'Hoeveel mensen blijven aan boord bij jagen?',opts:['Geen','1','Minimaal 2','Iedereen'],correct:2,why:'Minimaal 2 voor besturen.'},
    {q:'Welke regel klopt NIET bij slepen?',opts:['Niet staan','Niet in slaapzak','Wel mogen overlopen','Lijn voor/achter klaar'],correct:2,why:'Overlopen mag NIET.'}
   ]},

  {id:'commando-bouwer',section:'verdieping',icon:'🧩',title:"Commando-bouwer",desc:"Bouw zelf de juiste commando's",
   custom:'commandobouwer',
   lessons:[
    {title:'Speel: bouw het commando',body:`<p>Bouw het juiste commando door bouwstenen te combineren!</p>
      <p class="hint">Tip: vrijwel elk commando begint met "Op riemen", behalve de 2 uitzonderingen.</p>
      <div id="commandoBouwer"></div>`,custom:'commandobouwer'}
   ],
   quiz:[
    {q:'Welk commando geef je ALTIJD voor een nieuw commando, behalve 2 uitzonderingen?',opts:['Riemen op','Op riemen','Riemen toe','Gelijk'],correct:1,why:'"Op riemen" sluit het vorige commando — behalve stopt af en riemen lopen.'},
    {q:'Wat is een waarschuwingscommando?',opts:['Uitvoeringsdeel','Eerste deel voor de roeiers','Commando bij gevaar','"Stopt af"'],correct:1,why:'Het waarschuwingsdeel bereidt de roeiers voor, dan volgt na pauze het uitvoeringscommando.'},
    {q:'Welk commando = "riemen verticaal de lucht in"?',opts:['Riemen op','Op riemen','Riemen toe','Riemen geroeid'],correct:0,why:'"Riemen op" — bij saluut of als eerste stap bij afvaren.'}
   ]},

  {id:'verlichting',section:'verdieping',icon:'💡',title:'Scheepsverlichting',desc:"Welk schip is dit 's nachts?",
   lessons:[
    {title:'De lichten-sectoren',body:`<p>Aan de lichten kun je zien hoe een schip vaart.</p>
      ${lichtCirkelSvg()}
      <ul><li><strong>Toplicht (wit, 225°)</strong> — voor en zijwaarts</li>
      <li><strong>Bakboordlicht (rood, 112,5°)</strong> — alleen BB-zijde</li>
      <li><strong>Stuurboordlicht (groen, 112,5°)</strong> — alleen SB-zijde</li>
      <li><strong>Heklicht (wit, 135°)</strong> — achterkant</li></ul>
      <div class="callout-tip callout">1 boordlicht → kruisend. Heklicht → jij loopt op. Groen+rood naast elkaar → tegengesteld.</div>`},
    {title:'Schepen kleiner dan 7 meter',body:`<p>Geen boordlichten — alleen 1 wit rondom schijnend licht.</p>
      <ul><li>Roeiboot, kano, klein motorbootje (&lt;13 km/u)</li></ul>`},
    {title:'Schepen 7–20 meter',body:`<p><strong>Klein zeilschip</strong>: boordlichten + wit heklicht (geen toplicht)</p>
      <p><strong>Klein motorschip</strong>: boordlichten + wit toplicht + wit heklicht</p>`},
    {title:'Grote schepen (>20m)',body:`<ul>
      <li><strong>Groot motorschip</strong>: boordlichten + toplicht + heklicht</li>
      <li><strong>Groot zeilschip</strong>: boordlichten + heklicht + <span style="color:#C44536">rood</span> boven <span style="color:#2D6A4F">groen</span> in mast</li>
      <li><strong>Snel motorschip</strong>: + 2 gele flikkerlichten</li></ul>`},
    {title:'Sleper, sleep, veerpont',body:`<p><strong>Sleper</strong>: boordlichten + 2 of 3 toplichten boven elkaar + geel heklicht</p>
      <p><strong>Sleep</strong>: 1 wit rondom licht. Achterste ook heklicht.</p>
      <p><strong>Veerpont vrij varend</strong>: boordlichten + heklicht + <span style="color:#2D6A4F">groen</span> boven wit</p>
      <div class="callout-warn callout">Gevaarlijke stoffen: blauwe lichten (1/2/3 = 10m/50m/100m).</div>`},
    {title:'Stilliggende schepen',body:`<ul>
      <li>Klein schip voor anker: 1 wit rondom licht</li>
      <li>Groot schip voor anker: 2 witte rondom lichten — voorste hoger</li></ul>`}
   ],
   quiz:[
    {q:"'s Nachts alleen groen licht zien naderen: welke koers?",opts:['Tegengesteld','Kruisend (vanuit SB)','Oplopend','Voor anker'],correct:1,why:'1 boordlicht = kruisend. Groen = SB-licht, dus kruist van rechts.'},
    {q:'Rood EN groen naast elkaar naderen: wat doet die boot?',opts:['Voor anker','Oplopend','Recht op je af (tegengesteld)','Veerpont'],correct:2,why:'Beide boordlichten = tegengesteld.'},
    {q:'Welke boot heeft GEEN boordlichten?',opts:['Roeiboot','Klein motorschip 8m','Groot zeilschip','Snel motorschip'],correct:0,why:'Boten &lt;7m hebben geen boordlichten.'},
    {q:"Schip met gevaarlijke stoffen 's nachts?",opts:['Rode flikkerlichten','Blauwe lichten 1/2/3 boven elkaar','Gele kegels','Niets'],correct:1,why:'Blauwe lichten, net als de blauwe kegels overdag.'},
    {q:'Groot schip voor anker: wat zie je?',opts:['1 wit licht','2 witte rondom lichten — voorste hoger','Rood en groen','3 witte lichten'],correct:1,why:'2 witte rondom lichten, voorste hoger. Klein schip = maar 1.'}
   ]},

  {id:'geluidsseinen',section:'verdieping',icon:'📢',title:'Geluidsseinen',desc:'Korte en lange stoten',
   lessons:[
    {title:'Geluidsseinen — basis',body:`<ul><li>● <strong>Korte stoot</strong> = 1 seconde</li><li>━ <strong>Lange stoot</strong> = 4 seconden</li></ul>`},
    {title:'Te kunnen GEVEN (klein schip)',body:`<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin:10px 0">
      <p><strong>━</strong> &nbsp;= Attentie</p>
      <p><strong>━ ● ● ●</strong> &nbsp;= Ik kan niet manoeuvreren</p>
      <p><strong>━ ━ ━ ━ ━</strong> &nbsp;= Noodsein (5 lange stoten)</p></div>`},
    {title:'Te kunnen HERKENNEN',body:`<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin:10px 0">
      <p><strong>●</strong> &nbsp;= Ik ga naar stuurboord</p>
      <p><strong>● ●</strong> &nbsp;= Ik ga naar bakboord</p>
      <p><strong>● ● ●</strong> &nbsp;= Ik ga achteruit</p>
      <p><strong>━ ●</strong> &nbsp;= Verzoek bediening sluis/brug</p>
      <p><strong>● ━ ● ━ ● ━ ●</strong> &nbsp;= Blijf weg!</p></div>
      <div class="ezel"><div class="ezel-lbl">Ezelsbruggetje</div><div class="ezel-text">"Ik ga naar S<span class="hl">B</span>" = 1 punt<br>"Ik ga naar <span class="hl">B B</span>" = 2 punten<br>"<span class="hl">A</span>chter<span class="hl">u</span>it" = 3 lettergrepen = 3 punten</div></div>`}
   ],
   quiz:[
    {q:'Wat betekent "● ●" (twee korte stoten)?',opts:['Attentie','Naar stuurboord','Naar bakboord','Achteruit'],correct:2,why:'2 korte = ik ga naar bakboord (twee B in BB).'},
    {q:'Hoe lang is een lange stoot?',opts:['1 sec','2 sec','4 sec','10 sec'],correct:2,why:'Lange stoot = 4 seconden.'},
    {q:'Wat is het noodsein?',opts:['1 lange stoot','3 korte','5 lange stoten','Continu'],correct:2,why:'Noodsein = 5 lange stoten.'},
    {q:'Wat betekent "● ● ●" (drie korte)?',opts:['Naar bakboord','Achteruit','Attentie','Noodsein'],correct:1,why:'3 korte = achteruit (ach-ter-uit = 3 lettergrepen).'}
   ]},

  {id:'weer',section:'verdieping',icon:'🌤️',title:'Het weer',desc:'Beaufort, wind, onweer',
   custom:'beaufort',
   lessons:[
    {title:'De Beaufort-schaal',body:`<p>Windkracht 0–12. Schuif de slider:</p>
      <div id="beaufort"></div>
      <div class="callout-warn callout">KNMI-waarschuwing vanaf <strong>6 Beaufort</strong>.</div>`,custom:'beaufort'},
    {title:'Ruimende vs krimpende wind',body:`<div class="compare">
      <div class="compare-col"><h4>Ruimende wind</h4><p>Met de klok mee. Oost om. <strong>Mooi weer op komst.</strong></p></div>
      <div class="compare-col"><h4>Krimpende wind</h4><p>Tegen de klok in. West om. <strong>Slechter weer.</strong></p></div></div>`},
    {title:'Luchtdruk',body:`<ul>
      <li>Hoge luchtdruk (&gt;1020) → mooi, stabiel weer</li>
      <li>Dalende luchtdruk → slechter weer aankomst</li>
      <li>Onder 990 bar → heel laag, vaak storm</li></ul>`},
    {title:'Onweer herkennen',body:`<p>Signalen: donkere stapelwolken (aambeeldvorm), wolken uit andere richting, stilte voor de storm.</p>
      <p><strong>Wat doe je?</strong></p>
      <ol><li>Zo snel mogelijk naar de kant</li><li>Reddingsvest aan</li>
      <li>Mast strijken</li><li>Niet onder boom</li><li>Op het hout, weg van staal</li></ol>`},
    {title:'Winddraaiing',body:`<p>Bij een naderende depressie: wind gaat eerst liggen, steekt op, valt weg bij kern, dan tegenovergesteld.</p>`}
   ],
   quiz:[
    {q:'Vanaf welke windkracht KNMI-waarschuwing?',opts:['4 Bft','5 Bft','6 Bft','8 Bft'],correct:2,why:'Vanaf 6 Beaufort.'},
    {q:'Wat betekent ruimende wind?',opts:['Met klok mee — slechter','Met klok mee — mooi weer','Tegen klok in — mooi','Wind neemt af'],correct:1,why:'Ruimende wind = met de klok mee, mooi weer op komst.'},
    {q:'Aan welke wolk herken je onweer?',opts:['Sluierwolken','Donkere stapelwolk met platte bovenkant','Lage mist','Cirrus'],correct:1,why:'Cumulonimbus met aambeeldvorm = onweer.'},
    {q:'Wat doe je als eerste bij naderend onweer?',opts:['Mast strijken','Zo snel mogelijk naar de kant','Reddingsvest','Anker'],correct:1,why:'Eerst naar de kant. Dan vest, dan mast.'}
   ]},

  {id:'onderhoud',section:'verdieping',icon:'🛠️',title:'Boot onderhouden',desc:'Dagelijks en winteronderhoud',
   lessons:[
    {title:'Dagelijks onderhoud',body:`<ul>
      <li>Riemen recht of overeind opbergen</li>
      <li>Boot uithozen en droog houden</li>
      <li>Beschadigingen bijwerken: schuren, meniën, lakken</li>
      <li>Nat touw aan houten pin (niet ijzeren spijker — roest!)</li></ul>`},
    {title:'Winteronderhoud — 6 stappen',body:`<ol>
      <li>Algen en vuil verwijderen</li>
      <li>Krabben + staalborstel — roestplekken kaal</li>
      <li>Bodem teren met een <em>bokkenpoot</em></li>
      <li>Roestplekken in primer</li>
      <li>Grondverf</li>
      <li>Laklaag</li></ol>`},
    {title:'Verftips',body:`<ul>
      <li>Oude laag licht opschuren</li>
      <li>Afnemen met vochtige doek met <strong>ammonia</strong></li>
      <li>Kwast schoon met <strong>terpentine</strong> of <strong>peut</strong>, daarna in water</li></ul>
      <div class="callout">Volgorde: krabben → primer → grondverf → laklaag.</div>`},
    {title:'Soorten ankers',body:`<div class="anker-grid">
        <div class="anker-card">${ankerSvg('pool')}<div class="anker-name">Pool-anker</div></div>
        <div class="anker-card">${ankerSvg('danforth')}<div class="anker-name">Danforth</div></div>
        <div class="anker-card">${ankerSvg('stok')}<div class="anker-name">Stok-anker</div></div>
        <div class="anker-card">${ankerSvg('dreg')}<div class="anker-name">Dreg</div></div>
      </div>`}
   ],
   quiz:[
    {q:'Winterbeurt volgorde?',opts:['Lakken → primer → grondverf → krabben','Krabben → primer → grondverf → lakken','Grondverf → krabben → primer → lakken','Lakken → krabben → primer → grondverf'],correct:1,why:'Krabben → primer → grondverf → laklaag.'},
    {q:'Waar hang je nat touw aan?',opts:['IJzeren spijker','Houten pin','Op de grond','In de zon'],correct:1,why:'Houten pin — ijzer roest en tast touw aan.'},
    {q:'Wat is een bokkenpoot?',opts:['Knoop','Speciale kwast voor teren','Ankertype','Mastonderdeel'],correct:1,why:'Speciale kwast om bodem te teren.'},
    {q:'Waarmee kwasten schoonmaken na lakken?',opts:['Water','Terpentine of peut','Afwasmiddel','Ammonia'],correct:1,why:'Terpentine of peut (petroleum).'}
   ]},

  {id:'touwen-ankers',section:'verdieping',icon:'🪢',title:'Touwen & ankers',desc:'Welk touw, welk anker?',

      <li><strong>Kardelen</strong> — de strengen (meestal 3 of 4)</li>
      <li><strong>Tieren</strong> — groeven tussen de kardelen</li></ul>`},
    {title:'Soorten touw — interactief',body:`<p>Druk op een filter om te vergelijken:</p>
      <div id="touwTabel"></div>
      <div class="callout">In de praktijk: bijna alleen kunstvezel — natuurvezels rotten te snel.</div>`,custom:'touwtabel'},
    {title:'Vier ankertypes',body:`<div class="anker-grid">
        <div class="anker-card">${ankerSvg('pool')}<div class="anker-name">Pool</div><div class="anker-desc">Graaft goed in</div></div>
        <div class="anker-card">${ankerSvg('danforth')}<div class="anker-name">Danforth</div><div class="anker-desc">Plat, zachte bodem</div></div>

      </div>`}
   ],
   quiz:[
    {q:'Waarom geen onnodige knopen in een lijn?',opts:['Ziet rommelig uit','Touw slijt sneller en knopen lossen moeilijk','Verboden','Waait weg'],correct:1,why:'Knopen slijten touw sneller en zijn later moeilijk los te krijgen.'},

    {q:'Welk touw drijft op water?',opts:['Polyamide','Polyester','Polipropyleen','Hennep'],correct:2,why:'Polipropyleen drijft — ideaal voor landvasten.'}
   ]},

  {id:'etiquette',section:'verdieping',icon:'🎌',title:'Etiquette aan boord',desc:'Goed zeemanschap & vlagvoering',
   lessons:[
    {title:'Gedragsregels',body:`<ul>
      <li>Schip schoon en opgeruimd houden</li>
      <li>Geen lawaai</li>
      <li>Niet ongvraagd aan boord van andermans schip</li>
      <li>Aan paal vastmaken: jouw lijn <em>onder</em> een al bevestigde lijn</li>
      <li>Niet te dicht bij in/uitvaart aanleggen</li>
      <li>Hulp bieden als het kan</li>
      <li>Geen afval overboord</li></ul>`},
    {title:'Vlagvoering',body:`<ul>
      <li>Hijsen <em>na</em> zonsopgang</li>
      <li>Strijken <em>vóór</em> zonsondergang</li>
      <li>Uitzondering: vlag goed belicht door schijnwerper</li></ul>
      <div class="callout-warn callout">Geen reclamevlaggen! Scouting is geen commerciële organisatie.</div>`},
    {title:'Bij omslaan: koppen tellen',body:`<ol>
      <li><strong>Eerst koppen tellen</strong> — is iedereen er nog?</li>
      <li><strong>Blijf bij het schip</strong> — niet wegzwemmen!</li></ol>
      <p>Zwemmen kost energie → afkoelen en kramp. Omgeslagen schip drijft en is makkelijker te vinden.</p>
      <div class="callout">Reddingsvest: kraag, drijfvermogen, CE-keurmerk. Draait hoofd omhoog — ook bewusteloos.</div>`}
   ],
   quiz:[
    {q:'Wanneer wordt de Nederlandse vlag gestreken?',opts:['Bij zonsopgang','Vóór zonsondergang','Na zonsondergang','Nooit'],correct:1,why:'Gehesen na zonsopgang, gestreken vóór zonsondergang.'},
    {q:'Wat doe je als eerste als je schip omslaat?',opts:['Naar de kant zwemmen','Koppen tellen, bij boot blijven','Boot rechttrekken','Hulp roepen'],correct:1,why:'Eerst koppen tellen, dan bij het schip blijven.'},
    {q:'Verschil zwem- en reddingsvest?',opts:['Geen verschil','Reddingsvest draait hoofd omhoog','Zwemvest is duurder','Reddingsvest alleen voor kinderen'],correct:1,why:'Reddingsvest heeft kraag die hoofd draait — zelfs bewusteloos.'}
   ]}
];
